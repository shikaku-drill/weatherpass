<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainpass Tokyo — Compare & plan indoor experiences, live with the weather</title>
<meta name="description" content="Rainy in Tokyo? Compare indoor experiences by price, time and distance from where you're standing — then build a same-day plan in one tap.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=DotGothic16&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1526; --ink-2:#121F34; --ink-3:#1A2A44;
  --paper:#F5F7FB; --rain:#7CC3FF; --rain-deep:#3E8FDD;
  --amber:#FFB454; --mist:rgba(232,241,255,.64);
  --line:rgba(163,196,236,.16); --ok:#5FD6A7; --radius:18px;
  --font-display:"Bricolage Grotesque","Noto Sans JP","Noto Sans TC","Noto Sans SC","Noto Sans KR",system-ui,sans-serif;
  --font-body:"Inter","Noto Sans JP","Noto Sans TC","Noto Sans SC","Noto Sans KR",system-ui,sans-serif;
  --font-board:"DotGothic16",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--ink);color:#EAF2FC;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--rain);color:var(--ink)}
a{color:inherit} button{font-family:inherit;cursor:pointer}
:focus-visible{outline:3px solid var(--rain);outline-offset:2px;border-radius:6px}

/* topbar */
.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px clamp(14px,4vw,40px);background:rgba(11,21,38,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex:none}
.logo-mark{width:32px;height:32px;border-radius:10px;flex:none;background:linear-gradient(160deg,var(--rain),var(--rain-deep));display:grid;place-items:center;font-size:17px;box-shadow:0 0 0 1px rgba(124,195,255,.35),0 6px 18px rgba(62,143,221,.35)}
.logo-type{font-family:var(--font-display);font-weight:800;font-size:16px;letter-spacing:.02em;white-space:nowrap}
.logo-type span{color:var(--rain)}
.top-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
select{background:var(--ink-2);color:#EAF2FC;border:1px solid var(--line);border-radius:10px;padding:7px 9px;font-size:13px;font-weight:600;font-family:inherit}
.wx-btn{border:1px solid var(--line);background:var(--ink-2);color:var(--mist);padding:6px 9px;border-radius:999px;font-size:13px;font-weight:600;transition:all .18s ease}
.wx-btn[aria-pressed="true"]{background:var(--rain);border-color:var(--rain);color:var(--ink)}
.wx-btn:hover{border-color:var(--rain)}
.demo-label{font-family:var(--font-board);font-size:9px;color:var(--mist);letter-spacing:.12em;text-transform:uppercase}

/* hero */
.hero{position:relative;padding:clamp(36px,6vw,72px) clamp(16px,4vw,40px) clamp(28px,4vw,48px);display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr);gap:clamp(24px,4vw,56px);align-items:center;max-width:1200px;margin:0 auto}
@media(max-width:900px){.hero{grid-template-columns:1fr}}
.rain-layer{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;transition:opacity .8s ease}
.drop{position:absolute;top:-12vh;width:1.5px;height:14vh;background:linear-gradient(to bottom,transparent,rgba(139,197,255,.55));animation:fall linear infinite}
@keyframes fall{to{transform:translateY(115vh)}}
body[data-wx="cloudy"] .rain-layer{opacity:.18}
body[data-wx="clear"] .rain-layer{opacity:0}
@media(prefers-reduced-motion:reduce){.rain-layer{display:none}*{animation-duration:.001s!important;transition-duration:.001s!important}}
.hero-copy{position:relative;z-index:2}
.eyebrow{font-family:var(--font-board);font-size:12px;letter-spacing:.16em;color:var(--rain);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.eyebrow::before{content:"";width:26px;height:1px;background:var(--rain)}
h1{font-family:var(--font-display);font-weight:800;font-size:clamp(30px,5vw,56px);line-height:1.08;letter-spacing:-.01em;margin-bottom:16px}
h1 .wet{color:var(--rain)}
.hero-sub{color:var(--mist);font-size:clamp(14px,1.5vw,17px);max-width:54ch;margin-bottom:22px}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--amber);color:#231303;border:none;font-weight:700;font-size:14.5px;padding:13px 22px;border-radius:999px;box-shadow:0 8px 26px rgba(255,180,84,.28);transition:transform .16s ease,box-shadow .16s ease;text-decoration:none}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,180,84,.4)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--mist);border:1px solid var(--line);font-weight:600;font-size:13.5px;padding:12px 18px;border-radius:999px;transition:all .16s ease}
.btn-ghost:hover{border-color:var(--rain);color:#fff}

/* board */
.board{position:relative;z-index:2;background:linear-gradient(180deg,var(--ink-2),#0D1830);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 14px;box-shadow:0 24px 60px rgba(3,9,20,.6),inset 0 1px 0 rgba(163,196,236,.08)}
.board-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px dashed var(--line);margin-bottom:8px}
.board-title{font-family:var(--font-board);font-size:12px;letter-spacing:.18em;color:var(--mist)}
.board-clock{font-family:var(--font-board);font-size:16px;color:var(--rain)}
.board-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-family:var(--font-board);font-size:clamp(12px,1.3vw,14px);padding:8px 2px;border-bottom:1px solid rgba(163,196,236,.07);opacity:0;transform:translateY(6px);animation:rowIn .5s ease forwards}
.board-row:nth-child(2){animation-delay:.1s}.board-row:nth-child(3){animation-delay:.2s}
.board-row:nth-child(4){animation-delay:.3s}.board-row:nth-child(5){animation-delay:.4s}
@keyframes rowIn{to{opacity:1;transform:none}}
.board-row .k{color:var(--mist);letter-spacing:.06em}
.board-row .v{color:#fff;text-align:right}
.board-row .v.alert{color:var(--amber)} .board-row .v.good{color:var(--ok)}
.board-foot{margin-top:10px;font-family:var(--font-board);font-size:10px;color:var(--mist);letter-spacing:.08em;display:flex;align-items:center;gap:8px}
.blink{width:8px;height:8px;border-radius:50%;background:var(--amber);animation:blink 1.4s steps(2) infinite;flex:none}
body[data-wx="clear"] .blink{background:var(--ok)}
@keyframes blink{50%{opacity:.15}}

/* location bar */
.locbar{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:0 clamp(16px,4vw,40px) 6px}
.locbar-inner{border:1px solid var(--line);border-radius:var(--radius);background:rgba(18,31,52,.6);padding:14px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.loc-title{font-size:13.5px;font-weight:700;margin-right:4px;display:flex;align-items:center;gap:6px}
.chip{flex:none;border:1px solid var(--line);background:var(--ink-2);color:var(--mist);padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;transition:all .15s ease}
.chip:hover{border-color:var(--rain)}
.chip[aria-pressed="true"]{background:var(--rain);border-color:var(--rain);color:var(--ink)}
.chip.gps[aria-pressed="true"]{background:var(--ok);border-color:var(--ok);color:#07301F}
.chip.time[aria-pressed="true"]{background:var(--amber);border-color:var(--amber);color:#231303}

/* filters */
.filters{position:sticky;top:53px;z-index:50;background:rgba(11,21,38,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:10px clamp(16px,4vw,40px)}
.filters-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip-row::-webkit-scrollbar{display:none}
.chip-set-label{font-family:var(--font-board);font-size:10px;letter-spacing:.14em;color:var(--mist);text-transform:uppercase;flex:none;align-self:center;margin-right:2px;min-width:36px}
.filters-meta{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.result-count{font-size:13px;color:var(--mist)}
.result-count strong{color:#fff}

/* cards */
.deck{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:24px clamp(16px,4vw,40px) 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:20px}
.pass{background:var(--paper);color:#15233B;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 14px 40px rgba(3,9,20,.5);transition:transform .18s ease,box-shadow .18s ease;position:relative}
.pass:hover{transform:translateY(-4px);box-shadow:0 22px 52px rgba(3,9,20,.65)}
.pass.comparing{outline:3px solid var(--rain)}
.pass-art{height:120px;position:relative;display:flex;align-items:flex-end;padding:12px 14px;color:#fff}
.pass-art .glyph{position:absolute;right:14px;top:8px;font-size:48px;opacity:.9;filter:drop-shadow(0 4px 10px rgba(0,0,0,.3))}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-family:var(--font-board);font-size:10px;letter-spacing:.08em;background:rgba(9,16,30,.72);color:#fff;padding:4px 8px;border-radius:6px;backdrop-filter:blur(4px)}
.badge.now{background:var(--ok);color:#07301F}
.badge.hurry{background:var(--amber);color:#3A2102}
.badge.soldout{background:#B44;color:#fff}
.pass-body{padding:14px 14px 10px;display:flex;flex-direction:column;gap:7px;flex:1}
.pass-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.pass-name{font-family:var(--font-display);font-weight:700;font-size:17px;line-height:1.22}
.pass-rating{flex:none;font-size:12.5px;font-weight:700;color:#0F5FA8;background:#E3F0FD;border-radius:8px;padding:3px 8px}
.pass-meta{display:flex;flex-wrap:wrap;gap:5px 13px;font-size:12.5px;color:#5A6B85}
.pass-desc{font-size:13.5px;color:#3C4C66}
.perf{position:relative;border-top:2px dashed #C7D3E4;margin:4px 14px 0}
.perf::before,.perf::after{content:"";position:absolute;top:-9px;width:18px;height:18px;border-radius:50%;background:var(--ink)}
.perf::before{left:-23px}.perf::after{right:-23px}
.pass-stub{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px 6px}
.stub-price .p{font-family:var(--font-display);font-weight:800;font-size:19px}
.stub-price .per{font-size:10.5px;color:#5A6B85;display:block}
.book{display:inline-flex;align-items:center;gap:6px;background:var(--amber);color:#231303;border:none;text-decoration:none;font-weight:700;font-size:13px;padding:10px 15px;border-radius:12px;transition:transform .14s ease,background .14s ease}
.book:hover{transform:translateY(-1px);background:#FFC272}
.book.disabled{background:#D7DEE9;color:#8B99AF;pointer-events:none}
.provider{font-family:var(--font-board);font-size:9px;letter-spacing:.06em;opacity:.75}
.pass-actions{display:flex;gap:8px;padding:4px 14px 14px}
.mini-btn{flex:1;border:1.5px solid #C7D3E4;background:#fff;color:#3C4C66;font-weight:700;font-size:12.5px;padding:8px 6px;border-radius:10px;transition:all .14s ease}
.mini-btn:hover{border-color:var(--rain-deep);color:#0F5FA8}
.mini-btn.active{background:#0F5FA8;border-color:#0F5FA8;color:#fff}
.mini-btn.plan.active{background:#1E7A54;border-color:#1E7A54}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mist);border:1px dashed var(--line);border-radius:var(--radius)}
.empty strong{color:#fff}

/* compare tray */
.tray{position:fixed;left:50%;bottom:16px;transform:translate(-50%,120px);z-index:80;background:#fff;color:var(--ink);border-radius:999px;box-shadow:0 16px 44px rgba(0,0,0,.5);padding:10px 10px 10px 20px;display:flex;align-items:center;gap:14px;transition:transform .3s ease;max-width:calc(100vw - 24px)}
.tray.show{transform:translate(-50%,0)}
.tray-label{font-weight:700;font-size:14px;white-space:nowrap}
.tray-btn{background:var(--ink);color:#fff;border:none;font-weight:700;font-size:13.5px;padding:10px 18px;border-radius:999px}
.tray-clear{background:none;border:none;color:#5A6B85;font-weight:600;font-size:13px}

/* modal */
.modal{position:fixed;inset:0;z-index:90;background:rgba(5,10,20,.7);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;padding:0}
.modal.open{display:flex}
@media(min-width:760px){.modal{align-items:center;padding:24px}}
.sheet{background:var(--paper);color:#15233B;width:100%;max-width:860px;max-height:88vh;overflow:auto;border-radius:22px 22px 0 0;padding:22px}
@media(min-width:760px){.sheet{border-radius:22px}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet-head h2{font-family:var(--font-display);font-size:20px;font-weight:800}
.x{border:none;background:#E8EDF5;width:34px;height:34px;border-radius:50%;font-size:16px;font-weight:700}
table.cmp{width:100%;border-collapse:collapse;font-size:13.5px}
.cmp th,.cmp td{padding:10px 8px;border-bottom:1px solid #DCE4F0;text-align:left;vertical-align:top}
.cmp th:first-child{width:110px;color:#5A6B85;font-family:var(--font-board);font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:400}
.cmp td .nm{font-family:var(--font-display);font-weight:700;font-size:15px}
.cmp .best{background:#E7F6EE;border-radius:8px}
.cmp .bookrow td{border:none;padding-top:14px}

/* plan drawer */
.plan-fab{position:fixed;right:16px;bottom:16px;z-index:80;background:var(--amber);color:#231303;border:none;border-radius:999px;font-weight:800;font-size:14px;padding:14px 20px;box-shadow:0 12px 34px rgba(255,180,84,.4);display:flex;align-items:center;gap:8px;transition:transform .18s ease}
.plan-fab:hover{transform:translateY(-2px)}
.plan-count{background:#231303;color:var(--amber);border-radius:50%;min-width:22px;height:22px;display:grid;place-items:center;font-size:12px}
.plan-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #DCE4F0}
.plan-item .n{font-weight:700;font-size:14.5px}
.plan-item .s{font-size:12px;color:#5A6B85}
.plan-item button{border:none;background:#F0E3E3;color:#A33;border-radius:8px;padding:6px 10px;font-weight:700;font-size:12px}
.plan-total{display:flex;justify-content:space-between;font-family:var(--font-display);font-weight:800;font-size:17px;padding:14px 0 6px}
.plan-actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.plan-actions .btn-primary{box-shadow:none}
.plan-empty{color:#5A6B85;font-size:14px;padding:20px 0;text-align:center}

/* how/share/footer */
.how{max-width:1200px;margin:0 auto;position:relative;z-index:2;padding:32px clamp(16px,4vw,40px) 10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.how-card{border:1px solid var(--line);border-radius:var(--radius);padding:18px;background:rgba(18,31,52,.6)}
.how-card .k{font-family:var(--font-board);font-size:11px;letter-spacing:.14em;color:var(--rain);margin-bottom:8px;text-transform:uppercase}
.how-card p{font-size:14px;color:var(--mist)}
.share-strip{max-width:1200px;margin:24px auto 0;position:relative;z-index:2;padding:0 clamp(16px,4vw,40px)}
.share-inner{border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(120deg,rgba(124,195,255,.12),rgba(255,180,84,.08));padding:24px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px}
.share-inner h2{font-family:var(--font-display);font-weight:700;font-size:clamp(18px,2.3vw,23px)}
.share-inner p{color:var(--mist);font-size:14px;max-width:48ch}
footer{position:relative;z-index:2;margin-top:44px;border-top:1px solid var(--line);padding:24px clamp(16px,4vw,40px) 90px;color:var(--mist);font-size:12.5px}
.foot-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.toast{position:fixed;left:50%;bottom:80px;transform:translate(-50%,20px);background:#fff;color:var(--ink);font-weight:600;font-size:14px;padding:12px 20px;border-radius:999px;box-shadow:0 12px 32px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:all .25s ease;z-index:99;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body data-wx="rain">

<div class="rain-layer" id="rainLayer" aria-hidden="true"></div>

<header class="topbar">
  <a class="logo" href="#"><div class="logo-mark">☂</div><div class="logo-type">RAIN<span>PASS</span> TOKYO</div></a>
  <div class="top-controls">
    <select id="langSel" aria-label="Language">
      <option value="en">🌐 English</option>
      <option value="ja">日本語</option>
      <option value="zh-Hant">繁體中文</option>
      <option value="zh-Hans">简体中文</option>
      <option value="ko">한국어</option>
    </select>
    <span class="demo-label" data-i18n="demoWx">Demo wx</span>
    <button class="wx-btn" data-wx="rain" aria-pressed="true">🌧</button>
    <button class="wx-btn" data-wx="cloudy" aria-pressed="false">☁️</button>
    <button class="wx-btn" data-wx="clear" aria-pressed="false">☀️</button>
  </div>
</header>

<section class="hero">
  <div class="hero-copy">
    <div class="eyebrow" id="heroEyebrow"></div>
    <h1 id="heroTitle"></h1>
    <p class="hero-sub" id="heroSub"></p>
    <div class="hero-cta">
      <a class="btn-primary" href="#deck" id="ctaMain"></a>
      <button class="btn-ghost" id="shareBtn"></button>
    </div>
  </div>
  <aside class="board" aria-label="Current conditions">
    <div class="board-head"><span class="board-title" id="boardTitle"></span><span class="board-clock" id="clock">--:--</span></div>
    <div id="boardRows">
      <div class="board-row"><span class="k" id="kCond"></span><span class="v alert" id="bCond"></span></div>
      <div class="board-row"><span class="k" id="kEnds"></span><span class="v" id="bEnds"></span></div>
      <div class="board-row"><span class="k" id="kTemp"></span><span class="v" id="bTemp"></span></div>
      <div class="board-row"><span class="k" id="kPlan"></span><span class="v alert" id="bPlan"></span></div>
      <div class="board-row"><span class="k" id="kOpts"></span><span class="v good" id="bOpts"></span></div>
    </div>
    <div class="board-foot"><span class="blink"></span><span id="boardFoot"></span></div>
  </aside>
</section>

<div class="locbar">
  <div class="locbar-inner">
    <span class="loc-title">📍 <span id="locTitle"></span></span>
    <button class="chip gps" id="gpsChip" aria-pressed="false"></button>
    <span id="areaChips" style="display:contents"></span>
  </div>
</div>

<div class="filters" id="deck">
  <div class="filters-inner">
    <div class="chip-row" id="catRow" role="group">
      <span class="chip-set-label" data-i18n="fWhat"></span>
      <button class="chip" data-cat="all" aria-pressed="true" data-i18n="cAll"></button>
      <button class="chip" data-cat="art" aria-pressed="false">🎨 <span data-i18n="cArt"></span></button>
      <button class="chip" data-cat="aqua" aria-pressed="false">🐠 <span data-i18n="cAqua"></span></button>
      <button class="chip" data-cat="food" aria-pressed="false">🍣 <span data-i18n="cFood"></span></button>
      <button class="chip" data-cat="culture" aria-pressed="false">⛩ <span data-i18n="cCulture"></span></button>
      <button class="chip" data-cat="play" aria-pressed="false">🕹 <span data-i18n="cPlay"></span></button>
      <button class="chip" data-cat="relax" aria-pressed="false">♨️ <span data-i18n="cRelax"></span></button>
    </div>
    <div class="chip-row" id="timeRow" role="group">
      <span class="chip-set-label" data-i18n="fTime"></span>
      <button class="chip time" data-time="any" aria-pressed="true" data-i18n="tAny"></button>
      <button class="chip time" data-time="60" aria-pressed="false" data-i18n="t1h"></button>
      <button class="chip time" data-time="120" aria-pressed="false" data-i18n="t2h"></button>
      <button class="chip time" data-time="240" aria-pressed="false" data-i18n="tHalf"></button>
      <button class="chip time" data-open="1" aria-pressed="false">🟢 <span data-i18n="tOpen"></span></button>
    </div>
    <div class="filters-meta">
      <span class="result-count" id="resultCount"></span>

function hav(a,b){
  const R=6371,dLa=(b.lat-a.lat)*Math.PI/180,dLo=(b.lng-a.lng)*Math.PI/180;
  const s=Math.sin(dLa/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

  clear:{eyebrow:(w)=>`실시간 · ${w} · ☀️`,title:`오늘은 맑음.<br><span class="wet">다음 폭우</span>를 위해 북마크해 두세요.`,
   sub:"햇살을 즐기세요. 도쿄는 1년에 약 115일 비가 옵니다. 아래 체험은 오늘도 모두 예약 가능해요.",
   cond:"맑음 · 0mm",condC:"good",ends:"비 예보 없음",temp:"26°C / 55%",plan:"마음껏 즐기세요!",planC:"good"}},
 desc:{planets:"물과 거울, 빛 사이를 맨발로 걷기. 도쿄에서 가장 많이 공유되는 비 오는 날 스팟.",

  borderless:"Planets의 자매관. 지도 없이 방과 방이 흘러 섞이는 공간.",

}
};

/* =========================================================
   STATE
========================================================= */
const state={lang:"en",cat:"all",time:"any",openOnly:false,sort:"closing",wx:"rain",
  origin:{...AREAS[0],label:null,gps:false},compare:[],plan:[]};
const T=()=>I18N[state.lang];

/* rain layer */
(function(){const l=document.getElementById("rainLayer"),n=Math.min(90,Math.floor(innerWidth/12));
for(let i=0;i<n;i++){const d=document.createElement("div");d.className="drop";
d.style.left=Math.random()*100+"vw";d.style.animationDuration=(0.7+Math.random()*0.9)+"s";
d.style.animationDelay=(Math.random()*2)+"s";d.style.opacity=0.25+Math.random()*0.6;l.appendChild(d);}})();

/* clock */
function nowTokyo(){return new Date(new Date().toLocaleString("en-US",{timeZone:"Asia/Tokyo"}));}
function tickClock(){const t=nowTokyo();document.getElementById("clock").textContent=
String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");}
tickClock();setInterval(tickClock,15000);

function minsUntil(hhmm){const t=nowTokyo();const[h,m]=hhmm.split(":").map(Number);
return (h*60+m)-(t.getHours()*60+t.getMinutes());}
const yen=n=>"¥"+n.toLocaleString("en-US");
function distMin(a){return transitMin(hav(state.origin,{lat:a.lat,lng:a.lng}));}
function originLabel(){return state.origin.gps ? T().yourLoc : T().areas[state.origin.label];}

/* =========================================================
   RENDER: static strings
========================================================= */
function applyStatic(){
  const t=T();
  document.documentElement.lang=state.lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const v=t[el.dataset.i18n];
    if(typeof v==="string")el.innerHTML=v;
  });
  document.getElementById("boardTitle").textContent=t.boardTitle;
  document.getElementById("boardFoot").textContent=t.boardFoot;
  ["kCond","kEnds","kTemp","kPlan","kOpts"].forEach(id=>document.getElementById(id).textContent=t[id]);
  document.getElementById("ctaMain").textContent=t.ctaMain;
  document.getElementById("shareBtn").textContent=t.share;
  document.getElementById("shareBtn2").textContent=t.shareBtn;
  document.getElementById("locTitle").textContent=t.locTitle;
  document.getElementById("gpsChip").textContent=(state.origin.gps?"✓ "+t.gpsOn:"🛰 "+t.gps);
  document.getElementById("planFabLabel").textContent=t.planFab;
  renderAreaChips();applyWeather();render();renderTray();renderPlan();
}
function renderAreaChips(){
  const t=T(),wrap=document.getElementById("areaChips");
  wrap.innerHTML=AREAS.map(a=>`<button class="chip area" data-area="${a.id}"
    aria-pressed="${!state.origin.gps&&state.origin.label===a.id}">${t.areas[a.id]}</button>`).join("");
}
document.querySelector(".locbar").addEventListener("click",e=>{
  const b=e.target.closest("[data-area]");if(!b)return;
  const a=AREAS.find(x=>x.id===b.dataset.area);
  state.origin={lat:a.lat,lng:a.lng,label:a.id,gps:false};
  document.getElementById("gpsChip").setAttribute("aria-pressed","false");
  applyStatic();
});
document.getElementById("gpsChip").addEventListener("click",()=>{
  const t=T(),chip=document.getElementById("gpsChip");
  chip.textContent="⏳ "+t.locating;
  if(!navigator.geolocation){showToast(t.gpsFail);applyStatic();return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    state.origin={lat:pos.coords.latitude,lng:pos.coords.longitude,label:null,gps:true};
    chip.setAttribute("aria-pressed","true");
    applyStatic();
  },()=>{showToast(t.gpsFail);applyStatic();},{timeout:8000});
});

/* weather */
document.querySelectorAll(".wx-btn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".wx-btn").forEach(b=>b.setAttribute("aria-pressed","false"));
  btn.setAttribute("aria-pressed","true");state.wx=btn.dataset.wx;applyWeather();
}));
function applyWeather(){
  const t=T(),w=t.wx[state.wx];
  document.body.dataset.wx=state.wx;
  document.getElementById("heroEyebrow").textContent=w.eyebrow(originLabel());
  document.getElementById("heroTitle").innerHTML=w.title;
  document.getElementById("heroSub").textContent=w.sub;
  const set=(id,txt,cls)=>{const el=document.getElementById(id);el.textContent=txt;el.className="v"+(cls?" "+cls:"");};
  set("bCond",w.cond,w.condC);set("bEnds",w.ends);set("bTemp",w.temp);set("bPlan",w.plan,w.planC);
  const rows=document.getElementById("boardRows");
  rows.querySelectorAll(".board-row").forEach(r=>{r.style.animation="none";r.offsetHeight;r.style.animation="";});
}

/* =========================================================
   CARDS
========================================================= */
function filtered(){
  let list=ACTIVITIES.filter(a=>{
    if(state.cat!=="all"&&a.cat!==state.cat)return false;
    if(state.time!=="any"&&a.dur>Number(state.time))return false;
    if(state.openOnly&&minsUntil(a.last)<=0)return false;
    return true;
  });
  list.sort((a,b)=>{
    if(state.sort==="closing")return minsUntil(a.last)-minsUntil(b.last);
    if(state.sort==="near")return distMin(a)-distMin(b);
    if(state.sort==="price")return a.price-b.price;
    return b.rating-a.rating;
  });
  return list;
}
function render(){
  const t=T(),grid=document.getElementById("cards"),list=filtered();
  document.getElementById("resultCount").innerHTML=t.results(list.length);
  document.getElementById("bOpts").textContent=
    t.openNear(list.filter(a=>minsUntil(a.last)>0&&a.avail==="today").length);
  if(!list.length){grid.innerHTML=`<div class="empty">${t.empty}</div>`;return;}
  grid.innerHTML=list.map(a=>{
    const left=minsUntil(a.last),soldout=a.avail==="soldout",bookable=!soldout&&left>0;
    let sb;
    if(soldout)sb=`<span class="badge soldout">${t.soldOut}</span>`;
    else if(left<=0)sb=`<span class="badge">${t.lastPassed}</span>`;
    else if(left<=90)sb=`<span class="badge hurry">${t.lastIn(left)}</span>`;
    else sb=`<span class="badge now">${t.openNow}</span>`;
    const closeTxt=a.close==="nextday"?t.nextDay:a.close;
    const inCmp=state.compare.includes(a.id),inPlan=state.plan.includes(a.id);
    return `
    <article class="pass ${inCmp?"comparing":""}" data-id="${a.id}">
      <div class="pass-art" style="background:${a.grad}">
        <span class="glyph" aria-hidden="true">${a.glyph}</span>
        <div class="badges">${sb}<span class="badge">${t.indoor}</span></div>
      </div>
      <div class="pass-body">
        <div class="pass-top"><h3 class="pass-name">${a.n}</h3><span class="pass-rating">★ ${a.rating.toFixed(1)}</span></div>
        <div class="pass-meta">
          <span>📍 ${t.venueAreas[a.areaKey]} · ${t.minFrom(distMin(a),originLabel())}</span>
          <span>⏱ ${t.visit(Math.round(a.dur/60*10)/10)}</span>
          <span>🚪 ${t.doors(closeTxt)}</span>
        </div>
        <p class="pass-desc">${t.desc[a.id]}</p>
      </div>
      <div class="perf"></div>
      <div class="pass-stub">
        <div class="stub-price"><span class="p">${yen(a.price)}</span><span class="per">${t.perAdult}</span></div>
        <a class="book ${bookable?"":"disabled"}" href="#" data-book="${a.id}" ${bookable?"":'aria-disabled="true" tabindex="-1"'}>
          ${bookable?`${t.book} <span class="provider">${t.via(a.provider)}</span>`:t.unavailable}</a>
      </div>
      <div class="pass-actions">
        <button class="mini-btn ${inCmp?"active":""}" data-cmp="${a.id}">${inCmp?t.comparing:t.compare}</button>
        <button class="mini-btn plan ${inPlan?"active":""}" data-plan="${a.id}">${inPlan?t.inPlan:t.addPlan}</button>
      </div>
    </article>`;
  }).join("");
}
document.getElementById("cards").addEventListener("click",e=>{
  const t=T();
  const bk=e.target.closest("[data-book]");
  if(bk){e.preventDefault();const a=ACTIVITIES.find(x=>x.id===bk.dataset.book);showToast(t.toastBook(a.n));return;}
  const c=e.target.closest("[data-cmp]");
  if(c){const id=c.dataset.cmp;
    if(state.compare.includes(id))state.compare=state.compare.filter(x=>x!==id);
    else if(state.compare.length>=3){showToast(t.cmpMax);return;}
    else state.compare.push(id);
    render();renderTray();return;}
  const p=e.target.closest("[data-plan]");
  if(p){const id=p.dataset.plan;
    if(state.plan.includes(id))state.plan=state.plan.filter(x=>x!==id);
    else state.plan.push(id);
    render();renderPlan();return;}
});

/* filters */
document.getElementById("catRow").addEventListener("click",e=>{
  const b=e.target.closest("[data-cat]");if(!b)return;
  document.querySelectorAll("#catRow .chip").forEach(c=>c.setAttribute("aria-pressed","false"));
  b.setAttribute("aria-pressed","true");state.cat=b.dataset.cat;render();
});
document.getElementById("timeRow").addEventListener("click",e=>{
  const b=e.target.closest(".chip");if(!b)return;
  if(b.dataset.open){state.openOnly=!state.openOnly;b.setAttribute("aria-pressed",String(state.openOnly));}
  else{document.querySelectorAll("#timeRow [data-time]").forEach(c=>c.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");state.time=b.dataset.time;}
  render();
});
document.getElementById("sortSel").addEventListener("change",e=>{state.sort=e.target.value;render();});

/* =========================================================
   COMPARE
========================================================= */
function renderTray(){
  const t=T(),tray=document.getElementById("tray");
  document.getElementById("trayLabel").textContent=t.trayLabel(state.compare.length);
  document.getElementById("trayOpen").textContent=t.trayOpen;
  document.getElementById("trayClear").textContent=t.trayClear;
  tray.classList.toggle("show",state.compare.length>0);
}
document.getElementById("trayClear").addEventListener("click",()=>{state.compare=[];render();renderTray();});
document.getElementById("trayOpen").addEventListener("click",()=>{
  const t=T(),items=state.compare.map(id=>ACTIVITIES.find(a=>a.id===id));
  const min=(arr,f)=>Math.min(...arr.map(f)),max=(arr,f)=>Math.max(...arr.map(f));
  const bPrice=min(items,i=>i.price),bRate=max(items,i=>i.rating),bDist=min(items,i=>distMin(i));
  const row=(label,cells)=>`<tr><th>${label}</th>${cells.join("")}</tr>`;
  document.getElementById("cmpBody").innerHTML=`<table class="cmp">
    ${row("",items.map(i=>`<td><div class="nm">${i.glyph} ${i.n}</div><div style="font-size:12px;color:#5A6B85">${t.venueAreas[i.areaKey]}</div></td>`))}
    ${row(t.cmpPrice,items.map(i=>`<td class="${i.price===bPrice?"best":""}">${yen(i.price)}</td>`))}
    ${row(t.cmpRating,items.map(i=>`<td class="${i.rating===bRate?"best":""}">★ ${i.rating.toFixed(1)}</td>`))}
    ${row(t.cmpDur,items.map(i=>`<td>${t.visit(Math.round(i.dur/60*10)/10)}</td>`))}
    ${row(t.cmpDist,items.map(i=>`<td class="${distMin(i)===bDist?"best":""}">${t.cmpMin(distMin(i))}</td>`))}
    ${row(t.cmpClose,items.map(i=>`<td>${i.close==="nextday"?t.nextDay:i.close}</td>`))}
    ${row(t.cmpBest,items.map(i=>`<td>${t[i.best]}</td>`))}
    <tr class="bookrow"><th></th>${items.map(i=>`<td><a class="book" href="#" data-book2="${i.id}">${t.book}</a></td>`).join("")}</tr>
  </table>`;
  document.getElementById("cmpModal").classList.add("open");
});
document.getElementById("cmpBody").addEventListener("click",e=>{
  const b=e.target.closest("[data-book2]");if(!b)return;e.preventDefault();
  showToast(T().toastBook(ACTIVITIES.find(a=>a.id===b.dataset.book2).n));
});

/* =========================================================
   PLAN
========================================================= */
function renderPlan(){
  const t=T();
  document.getElementById("planCount").textContent=state.plan.length;
  const body=document.getElementById("planBody");
  if(!state.plan.length){body.innerHTML=`<div class="plan-empty">${t.planEmpty}</div>`;return;}
  const items=state.plan.map(id=>ACTIVITIES.find(a=>a.id===id));
  const total=items.reduce((s,i)=>s+i.price,0);
  const hours=Math.round(items.reduce((s,i)=>s+i.dur,0)/60*10)/10;
  body.innerHTML=items.map(i=>`
    <div class="plan-item">
      <div><div class="n">${i.glyph} ${i.n}</div>
      <div class="s">${t.venueAreas[i.areaKey]} · ${yen(i.price)} · ${t.visit(Math.round(i.dur/60*10)/10)}</div></div>
      <button data-rm="${i.id}">${t.remove}</button>
    </div>`).join("")+
    `<div class="plan-total"><span>${t.planTotal}</span><span>${yen(total)} · ${t.planHours(hours)}</span></div>
     <div class="plan-actions">
       <button class="btn-primary" id="planCopyBtn">${t.planCopy}</button>
       <button class="btn-ghost" id="planShareBtn" style="color:#3C4C66;border-color:#C7D3E4">${t.planShare}</button>
     </div>`;
}
document.getElementById("planBody").addEventListener("click",async e=>{
  const t=T();
  const rm=e.target.closest("[data-rm]");
  if(rm){state.plan=state.plan.filter(x=>x!==rm.dataset.rm);render();renderPlan();return;}
  if(e.target.id==="planCopyBtn"||e.target.id==="planShareBtn"){
    const items=state.plan.map(id=>ACTIVITIES.find(a=>a.id===id));
    const total=items.reduce((s,i)=>s+i.price,0);
    const text=t.planHeader+"\n"+items.map((i,ix)=>`${ix+1}. ${i.n} — ${yen(i.price)}`).join("\n")+
      `\n${t.planTotal}: ${yen(total)}\n${location.href}`;
    if(e.target.id==="planShareBtn"&&navigator.share){try{await navigator.share({title:"Rainpass",text});}catch(_){}}
    else{try{await navigator.clipboard.writeText(text);showToast(t.planCopied);}catch(_){showToast(t.planCopied);}}
  }
});
document.getElementById("planFab").addEventListener("click",()=>{renderPlan();document.getElementById("planModal").classList.add("open");});

/* modals */
document.querySelectorAll(".modal").forEach(m=>m.addEventListener("click",e=>{
  if(e.target===m||e.target.closest("[data-close]"))m.classList.remove("open");
}));
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.querySelectorAll(".modal.open").forEach(m=>m.classList.remove("open"));});

/* share & toast */
function showToast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
clearTimeout(el._to);el._to=setTimeout(()=>el.classList.remove("show"),2600);}
async function sharePage(){const t=T();
  const data={title:"Rainpass Tokyo",text:"☂",url:location.href};
  if(navigator.share){try{await navigator.share(data);}catch(_){}}
  else{try{await navigator.clipboard.writeText(location.href);showToast(t.toastCopy);}catch(_){showToast(t.toastCopy);}}}
document.getElementById("shareBtn").addEventListener("click",sharePage);
document.getElementById("shareBtn2").addEventListener("click",sharePage);

/* language */
document.getElementById("langSel").addEventListener("change",e=>{state.lang=e.target.value;applyStatic();});
(function detectLang(){
  const nav=(navigator.language||"en").toLowerCase();
  let pick="en";
  if(nav.startsWith("ja"))pick="ja";
  else if(nav.startsWith("ko"))pick="ko";
  else if(nav.startsWith("zh")){pick=(nav.includes("tw")||nav.includes("hk")||nav.includes("hant"))?"zh-Hant":"zh-Hans";}
  state.lang=pick;document.getElementById("langSel").value=pick;
})();

/* default origin: Asakusa */
state.origin={...AREAS[0],label:"asakusa",gps:false};
applyStatic();
</script>
